version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: qa-postgres-db
    restart: always
    environment:
      POSTGRES_USER: qa_admin
      POSTGRES_PASSWORD: secure_db_password_123!
      POSTGRES_DB: qa_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  qa-app:
    build: .
    container_name: qa-automation-app
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/app/backend/uploads
      - ./backend/reports:/app/backend/reports
    environment:
      - GEMINI_API_KEY=your_gemini_api_key_here
      - GEMINI_MODEL=gemini-2.5-flash
      - DATABASE_URL=postgresql://qa_admin:secure_db_password_123!@db:5432/qa_db
    depends_on:
      - db
    restart: always

volumes:
  postgres_data:
